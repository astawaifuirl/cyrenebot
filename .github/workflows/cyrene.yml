name: AList Downloader Workflow

# 使用 workflow_dispatch 实现手动触发，并定义两个输入参数
on:
  workflow_dispatch:
    inputs:
      script_url:
        description: '一次性脚本的下载链接 (URL)'
        required: true
        type: string
      target_folder:
        description: '需要处理的 AList 目录名称 (例如: aaaa)'
        required: true
        type: string

jobs:
  run-downloader:
    runs-on: ubuntu-latest

    steps:
      # ================== 1. 核心大扫除 (续命神技) ==================
      - name: 🧹 Maximize Build Space (清理预装环境释放空间)
        if: false
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      # ================== 2. 查看战果 ==================
      - name: 📊 Check current disk space (检查可用磁盘空间)
        run: |
          echo ">>> 磁盘大扫除完成！当前系统磁盘使用情况如下："
          df -h

      - name: 1. Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl wget unzip

      - name: 2. Install BaiduPCS-Go (Latest)
        run: |
          echo ">>> Fetching latest BaiduPCS-Go release..."
          DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/qjfoidnh/BaiduPCS-Go/releases/latest" | jq -r '.assets[] | select(.name | contains("linux-amd64.zip")) | .browser_download_url')
          wget "$DOWNLOAD_URL" -O baidupcs.zip
          unzip baidupcs.zip
          # 自动寻找解压出来的可执行文件并移动到系统路径
          find . -name "BaiduPCS-Go" -type f -exec sudo mv {} /usr/local/bin/ \;
          sudo chmod +x /usr/local/bin/BaiduPCS-Go
          BaiduPCS-Go -v

      - name: 3. Install Aria2-Pro-Core (128 threads)
        run: |
          echo ">>> Fetching latest Aria2-Pro-Core release..."
          DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/P3TERX/Aria2-Pro-Core/releases/latest" | jq -r '.assets[] | select(.name | contains("linux-amd64.tar.gz")) | .browser_download_url')
          wget "$DOWNLOAD_URL" -O aria2.tar.gz
          tar -xzf aria2.tar.gz
          sudo mv aria2c /usr/local/bin/
          sudo chmod +x /usr/local/bin/aria2c
          aria2c -v

      - name: 4. Install RAR from rarlab
        run: |
          echo ">>> Fetching RAR for Linux x64..."
          # 使用官方稳定的 7.01 版本
          wget https://www.rarlab.com/rar/rarlinux-x64-701.tar.gz -O rarlinux.tar.gz
          tar -xzf rarlinux.tar.gz
          sudo mv rar/rar /usr/local/bin/
          sudo chmod +x /usr/local/bin/rar
          rar | head -n 2

      - name: 6. Fetch and Execute Main Script
        run: |
          echo ">>> 下载并执行一次性脚本..."
          # 从你传入的参数获取脚本
          curl -sL "${{ inputs.script_url }}" -o main_script.sh
          
          # 将函数 source 到当前的 bash 环境中
          source main_script.sh
          
          # 提取传入的文件夹参数并执行函数
          download_alist_dir "${{ inputs.target_folder }}"
          
