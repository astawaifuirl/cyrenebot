name: AList Auto Downloader

# 触发条件：支持网页端手动填表单点击，也支持通过 API (curl/Discord Bot) 传参静默触发
on:
  workflow_dispatch:
    inputs:
      script_url:
        description: 'VPS 主脚本分发地址 (例如: http://aaa.com:28084)'
        required: true
        type: string
        default: 'http://aaa.com:28084'
      target_folder:
        description: '需要处理的云端文件夹名称'
        required: true
        type: string

jobs:
  process-files:
    runs-on: ubuntu-latest
    
    steps:
      # ================== 1. 核心大扫除 (续命神技) ==================
      - name: 🧹 Maximize Build Space (清理预装环境释放空间)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      # ================== 2. 查看战果 ==================
      - name: 📊 Check current disk space (检查可用磁盘空间)
        run: |
          echo ">>> 磁盘大扫除完成！当前系统磁盘使用情况如下："
          df -h

      # ================== 3. 准备神兵利器 ==================
      - name: ⚙️ Install Dependencies (安装基础依赖)
        run: |
          echo ">>> 正在安装 aria2, jq, rar, ncat..."
          sudo apt-get update
          sudo apt-get install -y aria2 jq rar ncat curl

      # 因为你的脚本里用到了 BaiduPCS-Go 来计算秒传哈希，GitHub 默认是没有的，必须临时下载配置
      - name: 🛠️ Setup BaiduPCS-Go (配置百度网盘命令行工具)
        run: |
          echo ">>> 正在拉取 BaiduPCS-Go..."
          wget -q https://github.com/qjfoidnh/BaiduPCS-Go/releases/download/v3.9.5/BaiduPCS-Go-v3.9.5-linux-amd64.zip
          unzip -q BaiduPCS-Go-v3.9.5-linux-amd64.zip
          sudo mv BaiduPCS-Go-v3.9.5-linux-amd64/BaiduPCS-Go /usr/local/bin/
          sudo chmod +x /usr/local/bin/BaiduPCS-Go
          echo ">>> BaiduPCS-Go 配置完成！版本信息："
          BaiduPCS-Go -v

      # ================== 4. 点火发射 ==================
      - name: 🚀 Execute Remote Main Script (执行云端流水线)
        run: |
          echo "======================================================="
          echo ">>> 目标文件夹: ${{ inputs.target_folder }}"
          echo ">>> 脚本源地址: ${{ inputs.script_url }}"
          echo "======================================================="
          
          echo ">>> [1/2] 正在从 VPS 拉取主脚本..."
          curl -sL "${{ inputs.script_url }}" -o main_script.sh
          
          # 安全校验：防止 VPS 防火墙拦截导致下载了空文件
          if [ ! -s main_script.sh ]; then
            echo "❌ 严重错误: 脚本下载失败或为空文件！请检查 VPS 的 28084 端口是否放行。"
            exit 1
          fi
          
          chmod +x main_script.sh
          echo ">>> [2/2] 主脚本拉取成功，开始载入并执行核心逻辑..."
          
          # 使用 source 加载脚本，并调用里面封装好的 download_alist_dir 函数
          source main_script.sh
          download_alist_dir "${{ inputs.target_folder }}"
